# =============================================================================
# CI Pipeline — angelina-consultoria
# =============================================================================
# Se ejecuta en cada push o PR a main.
#
# Required GitHub Actions secrets (for the e2e-tests job):
#   - LIVEKIT_TEST_API_KEY     : LiveKit Cloud test project API key
#   - LIVEKIT_TEST_API_SECRET  : LiveKit Cloud test project API secret (base64)
#   - LIVEKIT_TEST_URL         : LiveKit Cloud test project WSS URL (wss://...)
# Without these, the e2e-tests job fails with "LiveKit env vars missing"
# (loud, documented failure mode). Local dev runs `pnpm test:e2e` without
# the LIVEKIT_E2E gate and the videocall test is skipped.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: "22"
  DATABASE_URL: postgres://angelina:angelina_pass@localhost:5432/angelina_consultoria_test
  REDIS_URL: redis://localhost:6379
  MEILISEARCH_HOST: http://localhost:7700
  AUTH_SECRET: ci-secret

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm type-check

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm test:run --coverage

  e2e-tests:
    name: E2E Tests
    timeout-minutes: 30
    runs-on: ubuntu-latest
    env:
      # pre-deploy-verification: run the videocall test (was previously
      # skipped). LIVEKIT_TEST_* secrets come from a LiveKit Cloud free
      # test project (provisioned by the operator).
      LIVEKIT_E2E: "1"
      LIVEKIT_API_KEY: ${{ secrets.LIVEKIT_TEST_API_KEY }}
      LIVEKIT_API_SECRET: ${{ secrets.LIVEKIT_TEST_API_SECRET }}
      NEXT_PUBLIC_LIVEKIT_URL: ${{ secrets.LIVEKIT_TEST_URL }}
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: angelina
          POSTGRES_PASSWORD: angelina_pass
          POSTGRES_DB: angelina_consultoria_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - name: Install Playwright Browsers
        run: pnpm exec playwright install --with-deps chromium
      - name: Run Playwright tests
        run: pnpm test:e2e
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: pnpm audit --audit-level=high
        continue-on-error: true
