# =============================================================================
# docker-compose.yml — angelina-consultoria (local dev only)
# =============================================================================
# ADR-0001 (Vercel-Only): this file is for LOCAL DEV ONLY. Production deploys
# to Vercel + managed services (Vercel Postgres, Upstash REST, LiveKit Cloud,
# Vercel Blob). No service in this file is deployed to production.
#
# Local dev mirrors the prod stack where possible:
#   - Postgres (Docker)         ↔ Vercel Postgres (in prod)
#   - Redis (Docker)            ↔ Upstash REST (in prod)
#   - LiveKit Cloud dev project ↔ LiveKit Cloud prod project (same service)
#   - Object storage: NOT NEEDED in local dev (no current source uses it)

services:
  postgres:
    image: postgres:16-alpine
    container_name: angelina-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: angelina
      POSTGRES_PASSWORD: angelina_pass
      POSTGRES_DB: angelina_consultoria
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/dev/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U angelina -d angelina_consultoria"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: angelina-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
  redis_data:
